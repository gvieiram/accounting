name: Preview Status

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

permissions:
  statuses: write
  pull-requests: read

jobs:
  preview:
    name: Dokploy Preview Gate
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.user.login, 'dokploy')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Update preview status
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === "pull_request") {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.pull_request.head.sha,
                state: "pending",
                context: "Dokploy Preview",
                description: "Waiting for preview deployment...",
              });
              core.info("Set pending status");
              return;
            }

            const body = context.payload.comment.body || "";
            if (!body.includes("Preview Deployment")) return;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });

            let state = "pending";
            let description = "Preview deployment in progress...";

            if (body.includes("✅")) {
              state = "success";
              description = "Preview deployment ready";
            } else if (body.includes("❌")) {
              state = "failure";
              description = "Preview deployment failed";
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state,
              context: "Dokploy Preview",
              description,
            });

            core.info(`Set ${state} status for ${pr.head.sha.slice(0, 7)}`);
